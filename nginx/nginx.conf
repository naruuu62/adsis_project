events {
    worker_connections 1024;
}

http {

    # =============================================
    # Virtual Host 1: siam.local (dan localhost)
    # Proxy ke aplikasi Node.js di port 3000
    # Setup di Windows hosts file:
    #   127.0.0.1  siam.local
    # =============================================
    server {
        listen 80;
        server_name siam.local localhost;

        location / {
            proxy_pass         http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;

            proxy_read_timeout 300s;
            client_max_body_size 50M;
        }
    }

    # =============================================
    # Virtual Host 2: minio.local
    # Proxy ke MinIO Console di port 9001
    # Setup di Windows hosts file:
    #   127.0.0.1  minio.local
    # =============================================
    server {
        listen 80;
        server_name minio.local;

        # MinIO Console UI (WebSocket support)
        location / {
            proxy_pass         http://minio:9001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }

        # MinIO API (object storage S3-compatible)
        location /minio-api/ {
            rewrite ^/minio-api/(.*) /$1 break;
            proxy_pass         http://minio:9000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 100M;
        }
    }

    # =============================================
    # Virtual Host 3: db.local
    # Proxy ke phpMyAdmin di port 80 (internal docker)
    # Setup di Windows hosts file:
    #   127.0.0.1  db.local
    # =============================================
    server {
        listen 80;
        server_name db.local;

        location / {
            proxy_pass         http://phpmyadmin:80;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
