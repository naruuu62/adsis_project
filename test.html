<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload Mahasiswa</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 30px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        h2 { text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #result { margin-top: 20px; padding: 10px; display: none; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <h2>Test Tambah Mahasiswa</h2>

    <form id="uploadForm">
        <div class="form-group">
            <label>NIM:</label>
            <input type="text" name="nim" required placeholder="Contoh: 123456789">
        </div>
        <div class="form-group">
            <label>Nama:</label>
            <input type="text" name="nama" required placeholder="Contoh: Budi Santoso">
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" required placeholder="Contoh: budi@gmail.com">
        </div>
        <div class="form-group">
            <label>Prodi:</label>
            <input type="text" name="prodi" required placeholder="Contoh: Sistem Informasi">
        </div>
        <div class="form-group">
            <label>Foto (MinIO):</label>
            <input type="file" name="foto" accept="image/*" required>
        </div>
        <div class="form-group">
            <label>Scan Ijazah (MinIO):</label>
            <input type="file" name="ijazah" accept="application/pdf,image/*">
        </div>

        <button type="submit">Upload Data</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.innerHTML = 'Uploading... mohon tunggu.';

            const formData = new FormData(e.target);

            try {
                // Tembak langsung ke API docker kita
                const response = await fetch('http://siam.local/mahasiswa', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<b>Sukses!</b><br>Data berhasil masuk ke Database dan file tersimpan di MinIO.`;
                    e.target.reset(); // clear form
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<b>Error:</b> ${data.message || 'Gagal upload'}`;
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<b>Network Error:</b> Pastikan Docker sudah nyala dan http://siam.local bisa diakses.<br><small>${err.message}</small>`;
            }
        });
    </script>
</body>
</html>
